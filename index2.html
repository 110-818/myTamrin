<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>صفحه ورود</title>
</head>
<body class="flex justify-center items-center flex-col min-h-screen min-w-screen bg-gradient-to-br from-blue-600 to-indigo-800 gap-5 ">
    <div class="w-1/2">
        <form class="flex flex-col justify-center items-center gap-5 bg-white rounded-xl p-10 ">
            <h2 class="bg-gradient-to-br from-blue-600 to-indigo-800 text-center text-white px-6 py-2 rounded-lg">فرم ورود</h2>
            <input type="text" placeholder="نام خود را وارد کنید" class=" text-center px-6 py-2 rounded-lg border-2">
            <input type="text" placeholder="ایمیل خود را وارد کنید" class="text-center px-6 py-2 rounded-lg border-2">
            <input type="password" placeholder="رمز خود را وارد کنید" class="text-center px-6 py-2 rounded-lg border-2">
            <button class="bg-blue-600 hover:bg-indigo-700 w-20 h-10 rounded-lg transition active:scale-95 text-white duration-300">ورود</button>
        </form>
    </div>
</body>
</html>
